[ui]
title = "Baixador de Emendas Parlamentares"
subtitle = "Escolha a base, selecione colunas, aplique filtros e baixe a planilha em CSV ou Excel."

[downloads]
max_rows = 150000
max_columns = 30
preview_rows = 250
max_filter_options = 4000

[engine]
threads = 4

[auth]
enabled = true
cookie_name = "emendas_access_token"
tokens_path = "config/access_tokens.json"

[datasets.emendas]
label = "Emendas"
description = "Base consolidada das emendas parlamentares."
parquet_path = "data/parquet/emendas.parquet"
source_csv_path = "C:/Users/Eric/Downloads/Atualizar_emendas/Atualizar_emendas/out/emendasgeral13052026.csv"
default_sort = "valor_empenhado"
default_sort_desc = true
default_columns = [
  "codigo_emenda",
  "ano",
  "tipo_emenda",
  "nome_autor",
  "uf",
  "municipio",
  "nome_funcao",
  "nome_subfuncao",
  "programa_orcamentario",
  "acao_orcamentaria",
  "valor_empenhado",
  "valor_pago",
]
featured_filters = [
