<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acesso | Baixador de Emendas</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card">
        <span class="brand-kicker">Acesso protegido</span>
        <h1>{{ title }}</h1>
        <p>{{ subtitle }}</p>

        <form class="login-form" action="/login" method="post">
          <label class="control-field">
            <span>Token de acesso</span>
            <input name="token" type="password" placeholder="Cole o token cadastrado" autocomplete="current-password" required />
          </label>

          {% if error %}
          <div class="warning-box login-warning">
            Token invalido. Confira o valor e tente novamente.
          </div>
          {% endif %}

          <button class="primary-button login-button" type="submit">Entrar</button>
        </form>
      </section>
    </main>
  </body>
</html>
